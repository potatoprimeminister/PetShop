<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/5ca0f43a2b.js" crossorigin="anonymous"></script>
    <title>Pet Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="navTop">
            <div class="navItem">
                <div class="placeholderLogo">
                    <img src="img/placeholderLogo.png" alt="placeholder Logo">
                </div>
            </div>
            <div class="navItem">
                <div class="search">
                    <input type="text" class="searchInput" placeholder="Search...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
            <div class="navItem">
                <span class="limitedOffer">Limited Offer!</span>
            </div>
        </div>
        <div class="navBottom">
            <h3 class="menuItem">DOG</h3>
            <h3 class="menuItem">CAT</h3>
            <h3 class="menuItem">FISH</h3>
            <h3 class="menuItem">HAMSTER</h3>
            <h3 class="menuItem">SNAKE</h3>
        </div>
    </nav>
    <div class="slider">
        <div class="sliderWrapper">
            <div class="sliderItem">
                <img src="img/dog.png" alt="" class="sliderImg">
                <div class="sliderBG"></div>
                <h1 class="sliderTitle">Golden Retriever</h1>
                <h2 class="sliderPrice">$275</h2>
                <button class="buyBtn">Buy Now</button>
            </div>
            <div class="sliderItem">
                <img src="img/cat.png" alt="" class="sliderImg">
                <div class="sliderBG"></div>
                <h1 class="sliderTitle">Scottish Fold</h1>
                <h2 class="sliderPrice">$1250</h2>
                <button class="buyBtn">Buy Now</button>
            </div>
            <div class="sliderItem">
                <img src="img/fish.png" alt="" class="sliderImg">
                <div class="sliderBG"></div>
                <h1 class="sliderTitle">Siamese Fighting Fish </h1>
                <h2 class="sliderPrice">$35</h2>
                <button class="buyBtn">Buy Now</button>
            </div>
            <div class="sliderItem">
                <img src="img/hamster.png" alt="" class="sliderImg">
                <div class="sliderBG"></div>
                <h1 class="sliderTitle">Golden Hamster</h1>
                <h2 class="sliderPrice">$25</h2>
                <button class="buyBtn">Buy Now</button>
            </div>
            <div class="sliderItem">
                <img src="img/snake.png" alt="" class="sliderImg">
                <div class="sliderBG"></div>
                <h1 class="sliderTitle">Corn Snake</h1>
                <h2 class="sliderPrice">$100</h2>
                <button class="buyBtn">Buy Now</button>
            </div>

        </div>
    </div>
    <div class="features">
        <div class="feature">
            <img class="featureImg"></img>
            <span class="featureTitle">FREE SHIPPING</span>
            <span class="featureDesc">Free worldwide shipping on all order</span>
        </div>
    </div>
</body>
<script src="./script.js"></script>
</html>
